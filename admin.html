<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DARK8X ADMIN PANEL</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg: #050508;
  --surface: #0d0d14;
  --card: #11111c;
  --border: #1e1e30;
  --accent: #ff3c00;
  --accent2: #ff8c00;
  --gold: #ffd700;
  --text: #e8e8f0;
  --muted: #5a5a7a;
  --green: #00ff88;
  --red: #ff4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; min-height:100vh; }

/* LOGIN */
.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at center, rgba(255,60,0,0.08) 0%, transparent 70%);
}
.login-box {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 48px;
  width: 100%;
  max-width: 400px;
  clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
}
.login-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.login-sub { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:3px; margin-bottom:32px; }
.inp-label { font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:3px; color:var(--muted); display:block; margin-bottom:8px; text-transform:uppercase; }
.inp {
  width:100%; background:var(--surface); border:1px solid var(--border);
  color:var(--text); padding:12px 16px; font-family:'Rajdhani',sans-serif;
  font-size:16px; font-weight:600; outline:none; margin-bottom:16px; transition:border-color 0.2s;
}
.inp:focus { border-color: var(--accent); }
.btn-primary {
  width:100%; background:var(--accent); border:none; color:white;
  font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:4px;
  padding:14px; cursor:pointer; transition:all 0.2s;
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
}
.btn-primary:hover { background:var(--accent2); box-shadow:0 8px 30px rgba(255,60,0,0.4); }
.error-msg { color:var(--red); font-family:'Share Tech Mono',monospace; font-size:12px; margin-top:12px; display:none; }

/* DASHBOARD */
.dashboard { display:none; }
.topbar {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:16px 32px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.topbar-logo { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:4px; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.logout-btn {
  background:transparent; border:1px solid var(--border); color:var(--muted);
  font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px;
  padding:8px 16px; cursor:pointer; transition:all 0.2s;
}
.logout-btn:hover { border-color:var(--red); color:var(--red); }

.main-content { padding:32px; max-width:1100px; margin:0 auto; }

/* TABS */
.tabs { display:flex; gap:8px; margin-bottom:32px; border-bottom:1px solid var(--border); padding-bottom:0; }
.tab-btn {
  background:transparent; border:none; color:var(--muted);
  font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px;
  padding:12px 24px; cursor:pointer; border-bottom:3px solid transparent;
  transition:all 0.2s; margin-bottom:-1px;
}
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

.tab-content { display:none; }
.tab-content.active { display:block; }

/* SECTION HEADER */
.sec-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.sec-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:3px; }
.btn-add {
  background:var(--accent); border:none; color:white;
  font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:3px;
  padding:10px 24px; cursor:pointer; transition:all 0.2s;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
}
.btn-add:hover { background:var(--accent2); }

/* PRODUCT FORM */
.form-card {
  background:var(--card); border:1px solid var(--border);
  padding:32px; margin-bottom:24px; display:none;
  clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
}
.form-card.show { display:block; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-full { grid-column:1/-1; }
.form-row { margin-bottom:0; }
.form-actions { display:flex; gap:12px; margin-top:20px; }
.btn-save {
  background:var(--green); border:none; color:#000;
  font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:3px;
  padding:12px 32px; cursor:pointer; transition:all 0.2s;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
}
.btn-save:hover { opacity:0.85; }
.btn-cancel {
  background:transparent; border:1px solid var(--border); color:var(--muted);
  font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:3px;
  padding:12px 24px; cursor:pointer; transition:all 0.2s;
}
.btn-cancel:hover { border-color:var(--red); color:var(--red); }

/* PRODUCTS LIST */
.products-list { display:flex; flex-direction:column; gap:16px; }
.product-item {
  background:var(--card); border:1px solid var(--border);
  padding:24px; display:flex; align-items:center; justify-content:space-between;
  gap:16px; transition:border-color 0.2s; flex-wrap:wrap;
}
.product-item:hover { border-color:rgba(255,60,0,0.3); }
.product-info { flex:1; min-width:200px; }
.product-name { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; color:var(--text); }
.product-price { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--gold); margin-top:2px; }
.product-link {
  font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--muted);
  margin-top:6px; word-break:break-all; max-width:400px;
}
.product-actions { display:flex; gap:8px; flex-shrink:0; }
.btn-edit {
  background:transparent; border:1px solid var(--accent); color:var(--accent);
  font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px;
  padding:8px 16px; cursor:pointer; transition:all 0.2s;
}
.btn-edit:hover { background:var(--accent); color:white; }
.btn-delete {
  background:transparent; border:1px solid var(--red); color:var(--red);
  font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px;
  padding:8px 16px; cursor:pointer; transition:all 0.2s;
}
.btn-delete:hover { background:var(--red); color:white; }

/* ORDERS */
.orders-list { display:flex; flex-direction:column; gap:12px; }
.order-item {
  background:var(--card); border:1px solid var(--border);
  padding:20px 24px; display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:12px;
}
.order-info { flex:1; min-width:200px; }
.order-product { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; }
.order-buyer { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--muted); margin-top:4px; }
.order-amount { font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--gold); }
.order-status {
  font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px;
  padding:4px 12px; text-transform:uppercase;
}
.status-paid { background:rgba(0,255,136,0.1); color:var(--green); border:1px solid var(--green); }
.status-pending { background:rgba(255,140,0,0.1); color:var(--accent2); border:1px solid var(--accent2); }

.empty-state {
  text-align:center; padding:60px 20px;
  font-family:'Share Tech Mono',monospace; font-size:13px; color:var(--muted); letter-spacing:2px;
}

.toast {
  position:fixed; bottom:24px; right:24px;
  background:var(--green); color:#000;
  font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:3px;
  padding:14px 28px; z-index:9999; display:none;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

@media(max-width:600px) {
  .form-grid { grid-template-columns:1fr; }
  .main-content { padding:16px; }
  .topbar { padding:12px 16px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-title">DARK8X</div>
    <div class="login-sub">// ADMIN PANEL //</div>
    <label class="inp-label">Password</label>
    <input class="inp" type="password" id="adminPass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-primary" onclick="login()">🔐 LOGIN</button>
    <div class="error-msg" id="errorMsg">❌ Wrong password!</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">DARK8X ADMIN</div>
    <button class="logout-btn" onclick="logout()">LOGOUT</button>
  </div>

  <div class="main-content">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('products')">📦 PRODUCTS</button>
      <button class="tab-btn" onclick="switchTab('orders')">🧾 ORDERS</button>
    </div>

    <!-- PRODUCTS TAB -->
    <div class="tab-content active" id="tab-products">
      <div class="sec-header">
        <div class="sec-title">PRODUCTS</div>
        <button class="btn-add" onclick="toggleForm()">+ ADD PRODUCT</button>
      </div>

      <!-- ADD/EDIT FORM -->
      <div class="form-card" id="productForm">
        <div class="form-grid">
          <div class="form-row">
            <label class="inp-label">Product Name</label>
            <input class="inp" type="text" id="f_name" placeholder="FF Tournament App"/>
          </div>
          <div class="form-row">
            <label class="inp-label">Price (₹)</label>
            <input class="inp" type="number" id="f_price" placeholder="999"/>
          </div>
          <div class="form-row">
            <label class="inp-label">Category</label>
            <input class="inp" type="text" id="f_cat" placeholder="Tournament Platform"/>
          </div>
          <div class="form-row">
            <label class="inp-label">Badge (eg: 🔥 HOT)</label>
            <input class="inp" type="text" id="f_badge" placeholder="🔥 HOT"/>
          </div>
          <div class="form-full">
            <label class="inp-label">Cashfree Payment Link</label>
            <input class="inp" type="url" id="f_cashfree" placeholder="https://payments.cashfree.com/forms/..."/>
          </div>
          <div class="form-full">
            <label class="inp-label">Download Link (Mediafire / Drive)</label>
            <input class="inp" type="url" id="f_download" placeholder="https://www.mediafire.com/file/..."/>
          </div>
          <div class="form-full">
            <label class="inp-label">Description</label>
            <input class="inp" type="text" id="f_desc" placeholder="Short product description..."/>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-save" onclick="saveProduct()">✅ SAVE PRODUCT</button>
          <button class="btn-cancel" onclick="toggleForm()">CANCEL</button>
        </div>
      </div>

      <!-- PRODUCTS LIST -->
      <div class="products-list" id="productsList">
        <div class="empty-state">Loading products...</div>
      </div>
    </div>

    <!-- ORDERS TAB -->
    <div class="tab-content" id="tab-orders">
      <div class="sec-header">
        <div class="sec-title">ORDERS</div>
      </div>
      <div class="orders-list" id="ordersList">
        <div class="empty-state">Loading orders...</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ SAVED!</div>

<script>
// =============================================
// CONFIG
// =============================================
const ADMIN_PASSWORD = 'dark8x'; // 🔧 Change this password!

const firebaseConfig = {
  apiKey: "AIzaSyCEDNeRd8jqV36PnKdV49F3QhjfI_CwlFw",
  authDomain: "dark-panel-db812.firebaseapp.com",
  projectId: "dark-panel-db812",
  storageBucket: "dark-panel-db812.firebasestorage.app",
  messagingSenderId: "1026987423972",
  appId: "1:1026987423972:web:b6c16ab1dbac907764d4f1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// =============================================
// LOGIN
// =============================================
function login() {
  const pass = document.getElementById('adminPass').value;
  if (pass === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadProducts();
    loadOrders();
  } else {
    document.getElementById('errorMsg').style.display = 'block';
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('adminPass').value = '';
}

// =============================================
// TABS
// =============================================
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// =============================================
// FORM
// =============================================
let editingId = null;

function toggleForm() {
  const form = document.getElementById('productForm');
  form.classList.toggle('show');
  if (!form.classList.contains('show')) {
    clearForm();
    editingId = null;
  }
}

function clearForm() {
  ['f_name','f_price','f_cat','f_badge','f_cashfree','f_download','f_desc'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

// =============================================
// PRODUCTS CRUD
// =============================================
async function saveProduct() {
  const data = {
    name: document.getElementById('f_name').value.trim(),
    price: parseInt(document.getElementById('f_price').value),
    category: document.getElementById('f_cat').value.trim(),
    badge: document.getElementById('f_badge').value.trim(),
    cashfreeLink: document.getElementById('f_cashfree').value.trim(),
    downloadLink: document.getElementById('f_download').value.trim(),
    description: document.getElementById('f_desc').value.trim(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  if (!data.name || !data.price || !data.downloadLink) {
    alert('Name, Price, Cashfree Link & Download Link required!');
    return;
  }

  if (editingId) {
    await db.collection('products').doc(editingId).update(data);
  } else {
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    await db.collection('products').add(data);
  }

  clearForm();
  editingId = null;
  document.getElementById('productForm').classList.remove('show');
  showToast('✅ PRODUCT SAVED!');
  loadProducts();
}

async function loadProducts() {
  const snap = await db.collection('products').orderBy('createdAt', 'desc').get();
  const list = document.getElementById('productsList');

  if (snap.empty) {
    list.innerHTML = '<div class="empty-state">// NO PRODUCTS YET — ADD ONE! //</div>';
    return;
  }

  list.innerHTML = '';
  snap.forEach(doc => {
    const p = doc.data();
    const div = document.createElement('div');
    div.className = 'product-item';
    div.innerHTML = `
      <div class="product-info">
        <div class="product-name">${p.badge || ''} ${p.name}</div>
        <div class="product-price">₹${p.price}</div>
        <div class="product-link">💳 ${p.cashfreeLink || 'No payment link'}</div>
        <div class="product-link">📥 ${p.downloadLink || 'No download link'}</div>
      </div>
      <div class="product-actions">
        <button class="btn-edit" onclick="editProduct('${doc.id}')">EDIT</button>
        <button class="btn-delete" onclick="deleteProduct('${doc.id}')">DELETE</button>
      </div>
    `;
    list.appendChild(div);
  });
}

async function editProduct(id) {
  const doc = await db.collection('products').doc(id).get();
  const p = doc.data();
  editingId = id;

  document.getElementById('f_name').value = p.name || '';
  document.getElementById('f_price').value = p.price || '';
  document.getElementById('f_cat').value = p.category || '';
  document.getElementById('f_badge').value = p.badge || '';
  document.getElementById('f_cashfree').value = p.cashfreeLink || '';
  document.getElementById('f_download').value = p.downloadLink || '';
  document.getElementById('f_desc').value = p.description || '';

  document.getElementById('productForm').classList.add('show');
  document.getElementById('productForm').scrollIntoView({ behavior: 'smooth' });
}

async function deleteProduct(id) {
  if (confirm('Delete this product?')) {
    await db.collection('products').doc(id).delete();
    showToast('🗑️ DELETED!');
    loadProducts();
  }
}

// =============================================
// ORDERS
// =============================================
async function loadOrders() {
  const snap = await db.collection('orders').orderBy('createdAt', 'desc').get();
  const list = document.getElementById('ordersList');

  if (snap.empty) {
    list.innerHTML = '<div class="empty-state">// NO ORDERS YET //</div>';
    return;
  }

  list.innerHTML = '';
  snap.forEach(doc => {
    const o = doc.data();
    const date = o.createdAt ? new Date(o.createdAt.seconds * 1000).toLocaleDateString('en-IN') : '-';
    const div = document.createElement('div');
    div.className = 'order-item';
    div.innerHTML = `
      <div class="order-info">
        <div class="order-product">${o.productName || o.productId}</div>
        <div class="order-buyer">👤 ${o.buyerName || '-'} | 📧 ${o.buyerEmail || '-'} | 📱 ${o.buyerPhone || '-'}</div>
        <div class="order-buyer">📅 ${date}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
        <div class="order-amount">₹${o.price || '-'}</div>
        <span class="order-status ${o.status === 'paid' ? 'status-paid' : 'status-pending'}">${o.status || 'pending'}</span>
      </div>
    `;
    list.appendChild(div);
  });
}

// =============================================
// TOAST
// =============================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
</html>
